version: "3.9"

services:
  db:
    image: postgres:15
    container_name: edge_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edge_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edge_pass}
      POSTGRES_DB: ${POSTGRES_DB:-edge_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5432:5432"   # DB: localhost only (was public — CRITICAL)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edge_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: edge_redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-changeme}"]
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:6379:6379"   # Redis: localhost only (was public, no auth — CRITICAL)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edge_backend
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: https://thetaalgos.com
    ports:
      - "127.0.0.1:8000:8000"   # backend: nginx proxies, no need for public bind
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edge_frontend
    ports:
      - "127.0.0.1:5173:5173"   # frontend dev: not used in prod (Vercel serves)
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://178.104.173.85:8000
    depends_on:
      - backend

volumes:
  postgres_data:
